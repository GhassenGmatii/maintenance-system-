server {
    listen 80;
    server_name localhost;

    # Dossier racine des fichiers Angular compilés
    root /usr/share/nginx/html;
    index index.html;

    # Gestion du routage Angular (SPA)
    # Redirige toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le Backend Spring Boot
    # Toutes les requêtes /api/* sont redirigées vers le conteneur backend
    location /api/ {
        proxy_pass http://backend:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Mise en cache des fichiers statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
